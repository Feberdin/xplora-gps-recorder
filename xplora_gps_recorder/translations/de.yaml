configuration:
  log_level:
    name: Log-Level
    description: Steuert, wie viele Details das Add-on in die Logs schreibt.
  log_json:
    name: JSON-Logs
    description: Aktiviert strukturierte JSON-Logs für bessere Auswertung.
  poll_interval_seconds:
    name: Polling-Intervall
    description: Anzahl Sekunden zwischen zwei Xplora-Abfragen.
  sqlite_path:
    name: SQLite-Pfad
    description: Lokaler Dateipfad für die eingebaute Datenbank. Für normale Installationen einfach unverändert lassen.
  database_url:
    name: Datenbank-URL
    description: Optionale vollständige SQLAlchemy-URL. Wenn gesetzt, werden SQLite- und PostgreSQL-Einzelfelder ignoriert.
  postgres_host:
    name: PostgreSQL-Host
    description: Optionaler Datenbank-Host, wenn statt SQLite PostgreSQL verwendet werden soll.
  postgres_port:
    name: PostgreSQL-Port
    description: Optionaler TCP-Port der PostgreSQL-Datenbank.
  postgres_db:
    name: PostgreSQL-Datenbank
    description: Optionaler Name der PostgreSQL-Datenbank für xplora-gps-recorder.
  postgres_user:
    name: PostgreSQL-Benutzer
    description: Optionaler Benutzername der PostgreSQL-Datenbank.
  postgres_password:
    name: PostgreSQL-Passwort
    description: Optionales Passwort der PostgreSQL-Datenbank.
  xplora_base_url:
    name: Xplora-Basis-URL
    description: Vollständiger GraphQL-Endpunkt der Xplora-Cloud. Normalerweise einfach auf dem Standardwert lassen.
  xplora_country_code:
    name: Xplora-Ländervorwahl
    description: Nur nötig, wenn du dich mit Telefonnummer statt E-Mail anmeldest, zum Beispiel 49 für Deutschland.
  xplora_user_lang:
    name: Xplora-Sprache
    description: Sprachcode für den Login, zum Beispiel de-DE oder en-GB.
  xplora_time_zone:
    name: Xplora-Zeitzone
    description: IANA-Zeitzone für den Login, zum Beispiel Europe/Berlin.
  xplora_trigger_locate:
    name: Frische Position anfordern
    description: Fordert vor jedem Polling aktiv einen neuen Standort von der Uhr an.
  xplora_login_path:
    name: Xplora-Login-Pfad (Legacy)
    description: Wird im aktuellen GraphQL-Modus nicht mehr verwendet und kann auf dem Standardwert bleiben.
  xplora_devices_path:
    name: Xplora-Gerätepfad (Legacy)
    description: Wird im aktuellen GraphQL-Modus nicht mehr verwendet und kann auf dem Standardwert bleiben.
  xplora_location_path:
    name: Xplora-Standortpfad (Legacy)
    description: Wird im aktuellen GraphQL-Modus nicht mehr verwendet.
  xplora_username:
    name: Xplora-Benutzername
    description: Benutzername oder E-Mail des Xplora-Kontos.
  xplora_password:
    name: Xplora-Passwort
    description: Passwort des Xplora-Kontos.
  xplora_verify_ssl:
    name: TLS-Zertifikate prüfen
    description: Nur in kontrollierten Testumgebungen mit eigenen Zertifikaten deaktivieren.
  reverse_geocode_enabled:
    name: Reverse Geocoding
    description: Wandelt Koordinaten über Nominatim in lesbare Orte um.
  mqtt_enabled:
    name: MQTT aktivieren
    description: Veröffentlicht Positions- und Bewegungsdaten an einen MQTT-Broker.
  mqtt_host:
    name: MQTT-Host
    description: Hostname des MQTT-Brokers.
  mqtt_port:
    name: MQTT-Port
    description: TCP-Port des MQTT-Brokers.
  mqtt_user:
    name: MQTT-Benutzer
    description: Benutzername des MQTT-Brokers.
  mqtt_password:
    name: MQTT-Passwort
    description: Passwort des MQTT-Brokers.
  mqtt_topic_prefix:
    name: MQTT-Topic-Präfix
    description: Präfix für alle veröffentlichten MQTT-Topics.
